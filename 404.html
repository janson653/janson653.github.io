---
layout: default
title: 页面未找到
permalink: /404.html
---

<div class="container">
  <div class="error-page text-center py-5">
    <h1 class="error-code">404</h1>
    <h2 class="error-title mb-4">页面未找到</h2>
    <p class="error-description mb-4">抱歉，您访问的页面不存在或已被移动。</p>
    
    <div class="error-actions mb-5">
      <a href="{{ '/' | relative_url }}" class="btn btn-primary me-2">返回首页</a>
      <button onclick="window.history.back()" class="btn btn-outline-secondary">返回上一页</button>
    </div>
    
    <div class="error-search mb-5">
      <h3 class="mb-3">搜索内容</h3>
      <form action="{{ '/search/' | relative_url }}" method="get" class="search-form-404">
        <div class="input-group">
          <input type="search" name="q" class="form-control" placeholder="搜索..." aria-label="搜索">
          <button type="submit" class="btn btn-primary">搜索</button>
        </div>
      </form>
    </div>
    
    <div class="error-suggestions">
      <h3 class="mb-3">您可能感兴趣的内容</h3>
      <ul class="list-unstyled">
        {% for post in site.posts limit:5 %}
        <li class="mb-2">
          <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>

<style>
  .error-page {
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 0;
  }
  
  .error-code {
    font-size: 8rem;
    font-weight: 800;
    color: var(--secondary-color);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    margin-bottom: 1rem;
  }
  
  .error-title {
    font-size: 2rem;
    color: var(--accent-color);
  }
  
  .error-description {
    font-size: 1.2rem;
    color: var(--text-secondary);
  }
  
  .search-form-404 {
    max-width: 400px;
    margin: 0 auto;
  }
  
  .error-suggestions a {
    color: var(--secondary-color);
    text-decoration: none;
  }
  
  .error-suggestions a:hover {
    text-decoration: underline;
  }
</style>
