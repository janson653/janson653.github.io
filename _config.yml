# 站点设置
title: Janson Blog
email: zhangqian653@163.com
description: >- 
  这是一个专注于技术学习的博客，分享技术学习心得与实践经验。
baseurl: "" # 您的网站子路径，例如 /blog
url: "https://janson653.github.io" # 您的网站URL
github_username: janson653

# SEO设置
author: Janson
keywords: [技术博客, JavaCV, 视频处理, 图像处理, 技术分享]
lang: zh-CN
twitter:
  username: janson653
  card: summary_large_image
social:
  name: Janson
  links:
    - https://github.com/janson653
    - https://twitter.com/janson653

# 构建设置
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-minifier
  - jekyll-image-size

# 性能优化
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  blanklines: false
  profile: false

# 文章设置
permalink: /:categories/:year/:month/:day/:title/
paginate: 10
paginate_path: "/page:num/"

# 集合设置
collections:
  tutorials:
    output: true
    permalink: /:collection/:name/
  docs:
    output: true
    permalink: /docs/:path/

# 排除文件
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - README.md
  - CNAME
  - task/

# Sass设置
sass:
  style: compressed
  sass_dir: _sass
  sourcemap: never

# 默认YAML前置数据设置
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Janson"
      comments: true
      toc: true
      sharing: true
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "tutorials"
    values:
      layout: "post"
      author: "Janson"
      comments: true
      toc: true
      sharing: true

# 评论系统设置
comments:
  provider: "gitalk"  # 可选：gitalk, disqus
  gitalk:
    clientID: your_client_id
    clientSecret: your_client_secret
    repo: janson653.github.io
    owner: janson653
    admin: ['janson653']

# Analytics设置
google_analytics: # UA-XXXXXXXX-X
baidu_analytics: # your baidu analytics id

# 站点地图设置
sitemap:
  filename: "/sitemap.xml"
  exclude:
    - "/atom.xml"
    - "/feed.xml"
    - "/feed/index.xml"
  include_posts:
    - "/index.html"
  change_frequency_name: "change_frequency"
  priority_name: "priority" 