<header class="site-header">
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="{{ '/' | relative_url }}">
                {{ site.title }}
            </a>
            
            <!-- 主题切换按钮 -->
            <button class="theme-toggle" aria-label="切换主题">
                <svg class="theme-toggle-icon" viewBox="0 0 24 24" width="24" height="24">
                    <path class="sun-icon" d="M12 3v2M12 19v2M5.3 5.3l1.4 1.4M17.3 17.3l1.4 1.4M3 12h2M19 12h2M5.3 18.7l1.4-1.4M17.3 6.7l1.4-1.4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    <circle class="sun-circle" cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            
            <button class="navbar-toggle" aria-label="切换导航菜单">
                <span class="navbar-toggle-icon"></span>
            </button>
            
            <div class="navbar-menu">
                <ul class="navbar-nav">
                    {% for item in site.data.navigation %}
                    <li class="nav-item {% if page.url == item.url %}active{% endif %}">
                        <a class="nav-link" href="{{ item.url | relative_url }}">{{ item.title }}</a>
                    </li>
                    {% endfor %}
                </ul>
                
                <!-- 搜索框 -->
                <form class="search-form" action="{{ '/search' | relative_url }}" method="get">
                    <input type="search" name="q" placeholder="搜索..." aria-label="搜索">
                    <button type="submit" aria-label="搜索">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 0 0 1.48-5.34c-.47-2.78-2.79-5-5.59-5.34a6.505 6.505 0 0 0-7.27 7.27c.34 2.8 2.56 5.12 5.34 5.59a6.5 6.5 0 0 0 5.34-1.48l.27.28v.79l4.25 4.25c.41.41 1.08.41 1.49 0 .41-.41.41-1.08 0-1.49L15.5 14zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </nav>
</header>
