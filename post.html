<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 | Janson Blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --header-height: 60px;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding-top: var(--header-height);
        }
        .navbar {
            background-color: var(--primary-color);
            height: var(--header-height);
        }
        .navbar-brand {
            font-weight: 700;
            color: white;
        }
        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.85);
        }
        .navbar-nav .nav-link:hover {
            color: white;
        }
        .article-header {
            padding: 2rem 0;
            margin-bottom: 2rem;
            background-color: var(--light-color);
        }
        .article-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 1rem;
        }
        .article-meta {
            color: #666;
            font-size: 0.9rem;
        }
        .markdown-content {
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        }
        .markdown-content h1 {
            font-size: 2rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }
        .markdown-content h2 {
            font-size: 1.75rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        .markdown-content h3 {
            font-size: 1.5rem;
            margin-top: 1.2rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }
        .markdown-content p {
            margin-bottom: 1rem;
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            margin: 1rem 0;
        }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        .markdown-content code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 0.9em;
        }
        .markdown-content blockquote {
            border-left: 4px solid var(--secondary-color);
            padding-left: 1rem;
            margin-left: 0;
            color: #666;
            font-style: italic;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        .markdown-content table th, .markdown-content table td {
            border: 1px solid #ddd;
            padding: 0.5rem;
        }
        .markdown-content table th {
            background-color: #f6f8fa;
            text-align: left;
        }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--secondary-color);
            color: white;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 1000;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }
        footer {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .article-title {
                font-size: 1.8rem;
            }
            .markdown-content {
                padding: 1.5rem;
            }
        }
        
        /* 文章目录样式 */
        #toc {
            border-left: 3px solid var(--secondary-color);
            padding-left: 1rem;
        }
        
        #toc a {
            display: block;
            padding: 0.3rem 0;
            color: #555;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        
        #toc a:hover {
            color: var(--secondary-color);
            padding-left: 0.2rem;
        }
        
        .article-tags .badge {
            background-color: var(--secondary-color);
            font-weight: normal;
            padding: 0.35em 0.65em;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Janson Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">关于</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/janson653/janson653.github.io" target="_blank">GitHub</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 文章头部 -->
    <div class="article-header">
        <div class="container">
            <div id="article-title-container">
                <div class="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文章内容 -->
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="markdown-content" id="markdown-content">
                    <div class="loading-spinner">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <!-- 侧边栏 -->
                <div class="sidebar-module sidebar-module-inset bg-light p-4 mb-4 rounded">
                    <h4>关于本站</h4>
                    <p>这是一个专注于JavaCV技术的博客，分享JavaCV在视频处理领域的应用经验与技术心得。</p>
                </div>
                
                <div class="sidebar-module bg-light p-4 mb-4 rounded">
                    <h4>文章目录</h4>
                    <div id="toc" class="list-unstyled">
                        <!-- 目录将通过JS动态生成 -->
                    </div>
                </div>
                
                <div class="sidebar-module bg-light p-4 rounded">
                    <h4>友情链接</h4>
                    <ol class="list-unstyled">
                        <li><a href="https://github.com/bytedeco/javacv" target="_blank">JavaCV GitHub</a></li>
                        <li><a href="https://github.com/opencv/opencv" target="_blank">OpenCV GitHub</a></li>
                        <li><a href="https://github.com/FFmpeg/FFmpeg" target="_blank">FFmpeg GitHub</a></li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>Janson Blog</h5>
                    <p>分享JavaCV视频处理技术的学习心得与实践经验</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p>&copy; 2023 张先生的博客. 使用GitHub Pages搭建.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top">↑</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-groovy.min.js"></script>
    <script>
        // 获取URL参数
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        
        // 设置Marked选项
        marked.setOptions({
            highlight: function(code, lang) {
                if (Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                } else {
                    return code;
                }
            },
            breaks: true,
            gfm: true
        });
        
        // 获取文章内容
        async function fetchArticle() {
            const articlePath = getUrlParameter('article');
            if (!articlePath) {
                document.getElementById('markdown-content').innerHTML = '<div class="alert alert-danger">文章路径未指定</div>';
                document.getElementById('article-title-container').innerHTML = '<h1 class="article-title">文章未找到</h1>';
                return;
            }
            
            try {
                console.log('正在尝试加载文章:', articlePath);
                const response = await fetch(articlePath);
                if (!response.ok) {
                    throw new Error(`HTTP 错误! 状态码: ${response.status}, 请确认文件 "${articlePath}" 存在`);
                }
                
                const markdown = await response.text();
                
                // 处理YAML前置元数据
                let yamlFrontMatter = {};
                let contentWithoutYAML = markdown;
                let hasYAML = false;
                
                // 检查是否有YAML前置元数据 (---开头和结尾)
                const yamlMatches = markdown.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
                if (yamlMatches && yamlMatches.length >= 3) {
                    try {
                        hasYAML = true;
                        const yamlContent = yamlMatches[1];
                        contentWithoutYAML = yamlMatches[2];
                        
                        // 简单解析YAML内容
                        const yamlLines = yamlContent.split('\n');
                        yamlLines.forEach(line => {
                            if (line.trim() && line.includes(':')) {
                                const [key, ...valueParts] = line.split(':');
                                const value = valueParts.join(':').trim();
                                // 移除值中的引号
                                yamlFrontMatter[key.trim()] = value.replace(/^"(.*)"$/, '$1');
                            }
                        });
                        
                        console.log('YAML前置元数据:', yamlFrontMatter);
                    } catch (yamlError) {
                        console.error('解析YAML前置元数据失败:', yamlError);
                        // 回退到原始内容
                        contentWithoutYAML = markdown;
                    }
                }
                
                // 如果解析失败或没有YAML，尝试直接用全部内容
                const htmlContent = marked.parse(contentWithoutYAML);
                
                // 使用YAML中的标题，如果没有则尝试从Markdown中提取
                let title = yamlFrontMatter.title;
                if (!title) {
                    // 尝试从Markdown内容中提取标题
                    const titleMatch = contentWithoutYAML.match(/^#\s+(.+)$/m);
                    title = titleMatch ? titleMatch[1] : '文章标题';
                }
                
                // 获取日期和分类
                const postDate = yamlFrontMatter.date || '未知日期';
                const postCategories = yamlFrontMatter.categories || '未分类';
                
                // 解析标签
                let postTags = [];
                if (yamlFrontMatter.tags) {
                    // 如果标签是字符串格式 [tag1, tag2, tag3]
                    const tagsMatch = yamlFrontMatter.tags.match(/\[(.*)\]/);
                    if (tagsMatch && tagsMatch[1]) {
                        postTags = tagsMatch[1].split(',').map(tag => tag.trim());
                    } else {
                        postTags = [yamlFrontMatter.tags];
                    }
                }
                
                // 格式化日期显示
                let formattedDate = postDate;
                if (postDate.match(/^\d{4}-\d{2}-\d{2}$/)) {
                    const dateObj = new Date(postDate);
                    formattedDate = `${dateObj.getFullYear()}年${dateObj.getMonth() + 1}月${dateObj.getDate()}日`;
                }
                
                // 构建标签HTML
                let tagsHtml = '';
                if (postTags.length > 0) {
                    tagsHtml = `
                    <div class="article-tags mt-2">
                        <span>标签：</span>
                        ${postTags.map(tag => `<span class="badge bg-secondary me-1">${tag}</span>`).join('')}
                    </div>`;
                }
                
                // 更新标题和元数据
                document.getElementById('article-title-container').innerHTML = `
                    <h1 class="article-title">${title}</h1>
                    <div class="article-meta">
                        <span>发布日期：${formattedDate}</span> • 
                        <span>分类：${postCategories}</span>
                    </div>
                    ${tagsHtml}
                `;
                
                // 更新内容
                document.getElementById('markdown-content').innerHTML = htmlContent;
                
                // 创建目录
                createTableOfContents();
                
                // 设置页面标题
                document.title = `${title} | Janson Blog`;
                
                // 代码高亮
                Prism.highlightAll();
                
            } catch (error) {
                console.error('获取文章失败:', error);
                document.getElementById('markdown-content').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>获取文章失败</h4>
                        <p>${error.message}</p>
                        <p>可能的原因:</p>
                        <ul>
                            <li>文件路径错误：请检查文件 "${articlePath}" 是否存在</li>
                            <li>权限问题：请确保文件可以被正常访问</li>
                            <li>文件格式问题：请确保文件是有效的Markdown文档</li>
                        </ul>
                    </div>
                `;
                document.getElementById('article-title-container').innerHTML = '<h1 class="article-title">加载失败</h1>';
            }
        }
        
        // 创建目录
        function createTableOfContents() {
            const headings = document.querySelectorAll('.markdown-content h2, .markdown-content h3, .markdown-content h4');
            const toc = document.getElementById('toc');
            
            if (headings.length === 0) {
                toc.innerHTML = '<p class="text-muted">此文章没有目录</p>';
                return;
            }
            
            let tocHtml = '<ul class="list-unstyled ps-0">';
            let prevLevel = 0;
            
            headings.forEach((heading, index) => {
                // 为标题添加ID
                const id = `heading-${index}`;
                heading.id = id;
                
                // 根据标题级别添加不同的缩进
                const level = parseInt(heading.tagName.substring(1));
                const levelDiff = level - 2; // h2 -> 0, h3 -> 1, h4 -> 2
                
                // 处理目录层级变化
                if (prevLevel && level > prevLevel) {
                    // 开始子列表
                    tocHtml += '<ul class="list-unstyled ps-3">';
                } else if (prevLevel && level < prevLevel) {
                    // 结束子列表
                    for (let i = 0; i < prevLevel - level; i++) {
                        tocHtml += '</ul>';
                    }
                }
                
                // 添加目录项
                const textContent = heading.textContent.trim();
                tocHtml += `
                    <li class="mb-1">
                        <a href="#${id}" class="text-decoration-none ${levelDiff > 0 ? 'text-secondary' : 'text-dark'}" style="font-size: ${1 - levelDiff * 0.05}rem">
                            ${textContent}
                        </a>
                    </li>
                `;
                
                prevLevel = level;
            });
            
            // 闭合任何打开的列表
            for (let i = 0; i < prevLevel - 2; i++) {
                tocHtml += '</ul>';
            }
            
            tocHtml += '</ul>';
            toc.innerHTML = tocHtml;
        }
        
        // 加载文章
        document.addEventListener('DOMContentLoaded', fetchArticle);
        
        // 回到顶部功能
        window.onscroll = function() {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                document.querySelector('.back-to-top').style.display = "block";
            } else {
                document.querySelector('.back-to-top').style.display = "none";
            }
        };
        
        document.querySelector('.back-to-top').addEventListener('click', function() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
</body>
</html>
