<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章阅读 | Janson Blog</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --header-height: 60px;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding-top: var(--header-height);
        }
        .navbar {
            background-color: var(--primary-color);
            height: var(--header-height);
        }
        .navbar-brand {
            font-weight: 700;
            color: white;
        }
        .navbar-nav .nav-link {
            color: rgba(255, 255, 255, 0.85);
        }
        .navbar-nav .nav-link:hover {
            color: white;
        }
        .article-header {
            padding: 2rem 0;
            margin-bottom: 2rem;
            background-color: var(--light-color);
        }
        .article-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 1rem;
        }
        .article-meta {
            color: #666;
            font-size: 0.9rem;
        }
        .markdown-content {
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.05);
        }
        .markdown-content h1 {
            font-size: 2rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }
        .markdown-content h2 {
            font-size: 1.75rem;
            margin-top: 1.5rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
            border-bottom: 1px solid #eee;
            padding-bottom: 0.5rem;
        }
        .markdown-content h3 {
            font-size: 1.5rem;
            margin-top: 1.2rem;
            margin-bottom: 1rem;
            color: var(--dark-color);
        }
        .markdown-content p {
            margin-bottom: 1rem;
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            margin: 1rem 0;
        }
        .markdown-content ul, .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }
        .markdown-content code {
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace;
            background-color: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-size: 0.9em;
        }
        .markdown-content pre {
            background-color: #f6f8fa;
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin-bottom: 1.5rem;
        }
        .markdown-content pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 0.9em;
        }
        .markdown-content blockquote {
            border-left: 4px solid var(--secondary-color);
            padding-left: 1rem;
            margin-left: 0;
            color: #666;
            font-style: italic;
        }
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
        }
        .markdown-content table th, .markdown-content table td {
            border: 1px solid #ddd;
            padding: 0.5rem;
        }
        .markdown-content table th {
            background-color: #f6f8fa;
            text-align: left;
        }
        .back-to-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--secondary-color);
            color: white;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            z-index: 1000;
        }
        .loading-spinner {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }
        footer {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 0;
            margin-top: 3rem;
        }
        @media (max-width: 768px) {
            .article-title {
                font-size: 1.8rem;
            }
            .markdown-content {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Janson Blog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#about">关于</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="https://github.com/janson653/janson653.github.io" target="_blank">GitHub</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 文章头部 -->
    <div class="article-header">
        <div class="container">
            <div id="article-title-container">
                <div class="loading-spinner">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 文章内容 -->
    <div class="container">
        <div class="row">
            <div class="col-lg-8">
                <div class="markdown-content" id="markdown-content">
                    <div class="loading-spinner">
                        <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <!-- 侧边栏 -->
                <div class="sidebar-module sidebar-module-inset bg-light p-4 mb-4 rounded">
                    <h4>关于本站</h4>
                    <p>这是一个专注于JavaCV技术的博客，分享JavaCV在视频处理领域的应用经验与技术心得。</p>
                </div>
                
                <div class="sidebar-module bg-light p-4 mb-4 rounded">
                    <h4>文章目录</h4>
                    <div id="toc" class="list-unstyled">
                        <!-- 目录将通过JS动态生成 -->
                    </div>
                </div>
                
                <div class="sidebar-module bg-light p-4 rounded">
                    <h4>友情链接</h4>
                    <ol class="list-unstyled">
                        <li><a href="https://github.com/bytedeco/javacv" target="_blank">JavaCV GitHub</a></li>
                        <li><a href="https://github.com/opencv/opencv" target="_blank">OpenCV GitHub</a></li>
                        <li><a href="https://github.com/FFmpeg/FFmpeg" target="_blank">FFmpeg GitHub</a></li>
                    </ol>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <h5>Janson Blog</h5>
                    <p>分享JavaCV视频处理技术的学习心得与实践经验</p>
                </div>
                <div class="col-md-6 text-md-end">
                    <p>&copy; 2023 张先生的博客. 使用GitHub Pages搭建.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- 回到顶部按钮 -->
    <div class="back-to-top">↑</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-xml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-groovy.min.js"></script>
    <script>
        // 获取URL参数
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            var results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }
        
        // 设置Marked选项
        marked.setOptions({
            highlight: function(code, lang) {
                if (Prism.languages[lang]) {
                    return Prism.highlight(code, Prism.languages[lang], lang);
                } else {
                    return code;
                }
            },
            breaks: true,
            gfm: true
        });
        
        // 获取文章内容
        async function fetchArticle() {
            const articlePath = getUrlParameter('article');
            if (!articlePath) {
                document.getElementById('markdown-content').innerHTML = '<div class="alert alert-danger">文章路径未指定</div>';
                document.getElementById('article-title-container').innerHTML = '<h1 class="article-title">文章未找到</h1>';
                return;
            }
            
            try {
                const response = await fetch(articlePath);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const markdown = await response.text();
                const htmlContent = marked.parse(markdown);
                
                // 提取标题
                const titleMatch = markdown.match(/^#\s+(.+)$/m);
                const title = titleMatch ? titleMatch[1] : '文章标题';
                
                // 更新标题
                document.getElementById('article-title-container').innerHTML = `
                    <h1 class="article-title">${title}</h1>
                    <div class="article-meta">
                        <span>发布日期：2023年10月15日</span> • 
                        <span>分类：JavaCV入门</span>
                    </div>
                `;
                
                // 更新内容
                document.getElementById('markdown-content').innerHTML = htmlContent;
                
                // 创建目录
                createTableOfContents();
                
                // 设置页面标题
                document.title = `${title} | Janson Blog`;
                
                // 代码高亮
                Prism.highlightAll();
                
            } catch (error) {
                console.error('获取文章失败:', error);
                document.getElementById('markdown-content').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>获取文章失败</h4>
                        <p>${error.message}</p>
                    </div>
                `;
                document.getElementById('article-title-container').innerHTML = '<h1 class="article-title">加载失败</h1>';
            }
        }
        
        // 创建目录
        function createTableOfContents() {
            const headings = document.querySelectorAll('.markdown-content h2, .markdown-content h3');
            const toc = document.getElementById('toc');
            
            if (headings.length === 0) {
                toc.innerHTML = '<p>此文章没有目录</p>';
                return;
            }
            
            let tocHtml = '<ul class="list-unstyled ps-0">';
            
            headings.forEach((heading, index) => {
                // 为标题添加ID
                const id = `heading-${index}`;
                heading.id = id;
                
                // 根据标题级别添加不同的缩进
                const isH3 = heading.tagName.toLowerCase() === 'h3';
                const indentClass = isH3 ? 'ps-3' : '';
                
                tocHtml += `
                    <li class="${indentClass} mb-1">
                        <a href="#${id}" class="text-decoration-none ${isH3 ? 'text-secondary' : 'text-dark'}">${heading.textContent}</a>
                    </li>
                `;
            });
            
            tocHtml += '</ul>';
            toc.innerHTML = tocHtml;
        }
        
        // 加载文章
        document.addEventListener('DOMContentLoaded', fetchArticle);
        
        // 回到顶部功能
        window.onscroll = function() {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                document.querySelector('.back-to-top').style.display = "block";
            } else {
                document.querySelector('.back-to-top').style.display = "none";
            }
        };
        
        document.querySelector('.back-to-top').addEventListener('click', function() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        });
    </script>
</body>
</html>
